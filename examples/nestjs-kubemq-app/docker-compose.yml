version: "3.8"

services:
  kubemq:
    image: kubemq/kubemq:latest
    container_name: kubemq-broker
    ports:
      - "50000:50000"   # gRPC port
      - "9090:9090"     # REST gateway
      - "8080:8080"     # Dashboard
    environment:
      - KUBEMQ_TOKEN=${KUBEMQ_TOKEN:-}
    restart: unless-stopped
